<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tornillería | Ferretería Vargas y Araya</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-50 text-slate-900">
  <header class="border-b bg-white">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
      <a href="index.html">
        <img src="logo.png" alt="Ferretería Vargas y Araya" class="h-12 w-auto object-contain" />

      <a href="index.html#categorias" class="rounded-full bg-blue-700 px-4 py-2 text-sm font-bold text-white">
        ← Volver
      </a>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-12">
    <div class="rounded-[2rem] bg-white p-8 shadow-sm ring-1 ring-slate-100">
      <p class="font-bold uppercase tracking-widest text-red-600">Subcategorías</p>
      <h1 class="mt-2 text-4xl font-black">Tornillería</h1>
      <p class="mt-4 text-lg text-slate-600">
        Consulte por tornillos, clavos, tuercas, arandelas y productos de fijación.
      </p>

      <div class="mt-8 grid gap-4 sm:grid-cols-2">
        <div class="rounded-2xl bg-slate-50 px-4 py-3">Tornillos</div>
        <div class="rounded-2xl bg-slate-50 px-4 py-3">Clavos</div>
        <div class="rounded-2xl bg-slate-50 px-4 py-3">Tuercas</div>
        <div class="rounded-2xl bg-slate-50 px-4 py-3">Arandelas</div>
        <div class="rounded-2xl bg-slate-50 px-4 py-3">Pernos</div>
        <div class="rounded-2xl bg-slate-50 px-4 py-3">Anclajes</div>
        <div class="rounded-2xl bg-slate-50 px-4 py-3">Pijas</div>
        <div class="rounded-2xl bg-slate-50 px-4 py-3">Fijaciones y accesorios</div>
      </div>

      <div class="mt-10 flex flex-col gap-3 sm:flex-row">
        <a
          class="rounded-full bg-green-600 px-6 py-3 text-center font-bold text-white hover:bg-green-700"
          href="https://wa.me/50689789354?text=Hola%2C%20me%20gustar%C3%ADa%20consultar%20por%20productos%20de%20torniller%C3%ADa."
          target="_blank"
          rel="noreferrer"
        >
          💬 Consultar por WhatsApp
        </a>

        <a href="index.html#categorias" class="rounded-full bg-slate-900 px-6 py-3 text-center font-bold text-white">
          Ver más categorías
        </a>
      </div>
    </div>
  </main>
</body>
</html>
